name: Build and Push Docker Image

on:
  push:
    paths:
      - '_tools/world-model-bench/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: thecause/world-model-bench

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract commit SHA
        id: meta
        run: echo "sha_short=$(echo $GITHUB_SHA | head -c 7)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: _tools/world-model-bench
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/thecause/world-model-bench:latest
            ghcr.io/thecause/world-model-bench:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
